<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avantika AI — Ujjain ka Digital Divya Guide</title>
<meta name="description" content="Ujjain aur Mahakaleshwar ka AI guide — Darshan, Sawari, Events aur zyada!">
<meta name="theme-color" content="#FF6B00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avantika AI">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Tiro+Devanagari+Hindi&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FF6B00;
    --deep-saffron: #E55000;
    --gold: #D4A017;
    --gold-light: #F0C040;
    --ash: #E8E0D5;
    --dark: #1A0F00;
    --darker: #0D0700;
    --smoke: #2A1A0A;
    --text-light: #F5ECD7;
    --text-muted: #C4A882;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text-light);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(255,107,0,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(212,160,23,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,15,0,1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating diyas */
  .diya {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold-light);
    box-shadow: 0 0 10px 4px rgba(240,192,64,0.4);
    animation: float-diya linear infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes float-diya {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 20px;
    animation: fadeDown 1s ease;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .om-symbol {
    font-size: 3rem;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212,160,23,0.8);
    animation: pulse-glow 3s ease-in-out infinite;
    display: block;
    margin-bottom: 8px;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 30px rgba(212,160,23,0.8); }
    50% { text-shadow: 0 0 60px rgba(255,107,0,1), 0 0 100px rgba(212,160,23,0.6); }
  }

  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .header h1 span {
    color: var(--saffron);
  }

  .header p {
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 6px;
    font-style: italic;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--saffron), var(--gold), transparent);
    margin: 16px auto;
    width: 80%;
    opacity: 0.6;
  }

  /* Chat area */
  .chat-box {
    flex: 1;
    background: rgba(26,15,0,0.7);
    border: 1px solid rgba(212,160,23,0.2);
    border-radius: 16px;
    padding: 20px;
    overflow-y: auto;
    min-height: 380px;
    max-height: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(10px);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,107,0,0.05);
  }

  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-track { background: transparent; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

  /* Welcome message */
  .welcome-msg {
    text-align: center;
    padding: 20px;
    animation: fadeIn 1.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-msg .mahakal-icon {
    font-size: 3rem;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 10px rgba(255,107,0,0.5));
  }

  .welcome-msg h2 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold);
    font-size: 1.1rem;
    margin-bottom: 8px;
  }

  .welcome-msg p {
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1.6;
  }

  /* Quick questions */
  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
  }

  .quick-btn {
    background: rgba(255,107,0,0.1);
    border: 1px solid rgba(255,107,0,0.3);
    color: var(--saffron);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    transition: all 0.3s;
  }

  .quick-btn:hover {
    background: rgba(255,107,0,0.25);
    border-color: var(--saffron);
    transform: translateY(-1px);
  }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    animation: slideIn 0.4s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .message.user {
    flex-direction: row-reverse;
    animation: slideInRight 0.4s ease;
  }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .avatar.bot {
    background: radial-gradient(circle, rgba(212,160,23,0.3), rgba(255,107,0,0.1));
    border: 1px solid rgba(212,160,23,0.4);
    box-shadow: 0 0 15px rgba(212,160,23,0.2);
  }

  .avatar.user {
    background: rgba(255,107,0,0.15);
    border: 1px solid rgba(255,107,0,0.3);
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 1rem;
    line-height: 1.65;
  }

  .bubble.bot {
    background: rgba(42,26,10,0.9);
    border: 1px solid rgba(212,160,23,0.15);
    border-top-left-radius: 4px;
    color: var(--text-light);
  }

  .bubble.user {
    background: linear-gradient(135deg, rgba(255,107,0,0.2), rgba(229,80,0,0.15));
    border: 1px solid rgba(255,107,0,0.25);
    border-top-right-radius: 4px;
    color: var(--ash);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    background: rgba(26,15,0,0.8);
    border: 1px solid rgba(212,160,23,0.25);
    border-radius: 12px;
    color: var(--text-light);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 12px 16px;
    resize: none;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 50px;
    max-height: 120px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

  textarea:focus {
    border-color: rgba(255,107,0,0.5);
    box-shadow: 0 0 20px rgba(255,107,0,0.1);
  }

  .send-btn {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--saffron), var(--deep-saffron));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(255,107,0,0.3);
    flex-shrink: 0;
  }

  .send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(255,107,0,0.5);
  }

  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 14px 0 8px;
    color: rgba(196,168,130,0.4);
    font-size: 0.78rem;
    font-style: italic;
  }

  /* Decorative top border */
  .top-border {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--saffron), var(--gold), var(--saffron), transparent);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="top-border"></div>

<div class="container">
  <div class="header">
    <span class="om-symbol">ॐ</span>
    <h1>Avantika <span>AI</span></h1>
    <p>Ujjain ka Digital Divya Guide</p>
    <div class="divider"></div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="welcome-msg">
      <div class="mahakal-icon">🕉️</div>
      <h2>Har Har Mahadev! 🙏</h2>
      <p>Main hoon <strong style="color:var(--gold)">Avantika AI</strong> — Ujjain aur Mahakaleshwar ka digital guide.<br>
      Darshan, pooja, itihaas, travel — kuch bhi puchho!</p>
      <div class="quick-questions">
        <button class="quick-btn" onclick="askQuestion('Bhasma Aarti ki timing kya hai?')">🔥 Bhasma Aarti timing</button>
        <button class="quick-btn" onclick="askQuestion('Mahakal mandir ka itihaas batao')">🏛️ Mandir ka itihaas</button>
        <button class="quick-btn" onclick="askQuestion('Ujjain mein kya kya dekhne layak hai?')">📍 Tourist spots</button>
        <button class="quick-btn" onclick="askQuestion('Ujjain mein kahan khaana khayein?')">🍽️ Khaana kahaan</button>
        <button class="quick-btn" onclick="askQuestion('Mahakal ki sawari kab nikalti hai?')">🎺 Mahakal ki Sawari</button>
        <button class="quick-btn" onclick="askQuestion('Nag Chandreshwar mandir kab khulta hai?')">🐍 Nag Chandreshwar</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea 
        id="userInput" 
        placeholder="Mahadev se kuch poochho... 🙏" 
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">🪔</button>
  </div>

  <div class="footer">
    🕉️ Mahakaleshwar Jyotirlinga, Ujjain — Har Har Mahadev
    <br>
    <span style="color: rgba(255,107,0,0.5); font-size: 0.72rem; margin-top: 4px; display: block;">
      Developed with 🙏 by <strong style="color: rgba(255,107,0,0.8)">Sarthak Solanki</strong>
    </span>
  </div>
</div>

<script>
  // Create floating diyas
  function createDiya() {
    const diya = document.createElement('div');
    diya.className = 'diya';
    diya.style.left = Math.random() * 100 + 'vw';
    diya.style.animationDuration = (8 + Math.random() * 12) + 's';
    diya.style.animationDelay = Math.random() * 5 + 's';
    diya.style.width = diya.style.height = (4 + Math.random() * 5) + 'px';
    document.body.appendChild(diya);
    setTimeout(() => diya.remove(), 20000);
  }

  setInterval(createDiya, 1500);
  for(let i = 0; i < 5; i++) createDiya();

  // Chat logic
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  let conversationHistory = [];

  const systemPrompt = `Tu hai "Avantika AI" — Ujjain aur Mahakaleshwar ka expert AI guide. Tu sirf Ujjain, Mahakaleshwar mandir, aur related topics pe baat karta hai.

Tu jaanta hai:
- Mahakaleshwar Jyotirlinga ka itihaas, significance, pooja vidhi
- Bhasma Aarti — timing (subah 4 baje), booking process, rules
- 12 Jyotirlingas mein Mahakal ki khaas jagah — ye DAKSHINA MUKHI (south-facing) Shivling hai
- Mahakal Lok (Mahakaleshwar Corridor) — naya banaya gaya, 900m lamba

- 🎺 MAHAKAL KI SAWARI (bahut special local event):
  * Sawan maas mein — har Somwar ek sawari nikalti hai (4-5 baar total)
  * Bhadau (Bhadrapada) maas mein — 2 sawariyan nikalti hain
  * Kartik maas mein — 1 sawari nikalti hai
  * Bahut dhoom dhaam se nikalti hai — band baja, flowers, thousands of devotees
  * Ye Ujjain ka bahut khaas local event hai jo tourists miss kar jaate hain

- 🐍 NAG CHANDRESHWAR MANDIR:
  * Mahakal mandir ke upar 3rd floor pe hai
  * Saal mein sirf EK DIN khulta hai — Nag Panchami ke din
  * Baaki 364 din bilkul band rehta hai
  * Nag Panchami pe lakho log aate hain sirf iske darshan ke liye

- Ujjain ke tourist spots: Ram Ghat, Kal Bhairav Mandir, Sandipani Ashram, Vedshala (Observatory), Chintaman Ganesh, Harsiddhi Mata, Mangalnath
- Simhastha Kumbh Mela — har 12 saal mein Ujjain mein hota hai
- Ujjain ka itihaas — Avantika naam tha pehle, Vikramaditya ki rajdhani
- Local food: Poha-jalebi, Shikanji, Sabudana khichdi, Dahi vada
- Kshipra Nadi ka mahatva
- Darshan timings, fees, rules

Tu hamesha:
- Warm, friendly aur helpful rehta hai
- Hindi mein baat karta hai (Hinglish bhi theek hai)
- "Har Har Mahadev!" ya "Jai Mahakal!" jaise greetings use karta hai
- Short aur clear answers deta hai — zyada lamba mat karo
- Agar koi cheez Ujjain se related nahi hai, politely bol deta hai ki "Maaf karna, main sirf Ujjain aur Mahakal ke baare mein guide kar sakta hoon 🙏"
- Emojis use karta hai — 🕉️ 🙏 🔥 📍 ⏰ etc.`;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? '🕉️' : '🙏';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typingMsg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🕉️';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  async function askQuestion(q) {
    userInput.value = q;
    await sendMessage();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // Remove welcome if first message
    const welcome = chatBox.querySelector('.welcome-msg');
    if (welcome) welcome.remove();

    addMessage(text, 'user');
    conversationHistory.push({ role: 'user', content: text });

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    addTyping();

    try {
      const geminiMessages = conversationHistory.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AIzaSyAq82TOrhkys0H4B55iP8s4Vb96kMOXrMM`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: geminiMessages
        })
      });

      const data = await response.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Jai Mahakal! Kuch technical problem aa gayi, dobara try karo 🙏';

      removeTyping();
      addMessage(reply, 'bot');
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      addMessage('Jai Mahakal! 🙏 Network problem aa gayi. Dobara try karo.', 'bot');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  // PWA Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBtn();
  });

  function showInstallBtn() {
    const btn = document.createElement('button');
    btn.id = 'installBtn';
    btn.innerHTML = '📲 App Install Karo';
    btn.style.cssText = `
      position: fixed; bottom: 80px; right: 20px;
      background: linear-gradient(135deg, #FF6B00, #D4A017);
      color: white; border: none; border-radius: 25px;
      padding: 10px 18px; font-size: 0.85rem;
      cursor: pointer; z-index: 999;
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
      font-family: 'Crimson Pro', serif;
      animation: fadeIn 0.5s ease;
    `;
    btn.onclick = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        btn.remove();
      }
    };
    document.body.appendChild(btn);
  }
</script>
</body>
</html>
